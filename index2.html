<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <h1 class="logo">My Portfolio</h1>
      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="about" class="about">
      <h2>About Me</h2>
      <p>Creative developer passionate about design and code.</p>
    </section>

    <section id="projects" class="projects">
      <h2>Projects</h2>
      <div class="grid-container">
        <article class="project-card">Project 1</article>
        <article class="project-card">Project 2</article>
        <article class="project-card">Project 3</article>
      </div>
    </section>

    <section id="contact" class="contact">
      <h2>Contact</h2>
      <form>
        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">
        <textarea placeholder="Message"></textarea>
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 My Portfolio</p>
  </footer>
</body>
</html>
